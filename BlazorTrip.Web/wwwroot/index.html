<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>BlazorTrip.Web</title>
    <base href="./"/>
    <link rel="preload" id="webassembly"/>
    <link rel="stylesheet" href="design-system/design-system.css"/>
    <link rel="stylesheet" href="css/iconly.css"/>
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link href="BlazorTrip.Web.styles.css" rel="stylesheet"/>
    <link
            rel="stylesheet"
            type="text/css"
            href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Sora:wght@100..800&display=swap"
          rel="stylesheet">
    <script type="importmap"></script>
</head>

<body>
<div id="app">
    <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%"/>
        <circle r="40%" cx="50%" cy="50%"/>
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
</div>
<script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>

<script>
    window.dialogHelper = {
        addBackdropClick: (element) => {
            element._ref = (event) => {
                if (event.target === element) {
                    element.close();
                }
            }
            element.addEventListener('click', element._ref)
        },
        removeBackdropClick: (element) => {
            if (element && element._ref) {
                element.removeEventListener('click', element._ref);
                delete element._ref;
            }
        },
        show: (element) => {
            if (element && !element.open) {
                element.showModal();
            }
        },
        close: (element) => {
            if (element && element.open) {
                element.close();
            }
        }
    };
    window.popoverHelper = {
        show(popover) {
            popover.showPopover();
        },
        close(popover) {
            if (popover && popover.matches(':popover-open')) {
                popover.hidePopover();
            }
        },
        toggle(popover) {
            popover.togglePopover();
        }
    }
    window.focusHelper = {
        containsActiveElement(element) {
            return !!element && element.contains(document.activeElement);
        }
    }
    window.downloadCsv = (fileName, content) => {
        const link = document.createElement('a');
        link.download = fileName;
        link.href = "data:text/csv;base64," + content;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>

</html>
